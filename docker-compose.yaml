services:
  postgres:
    image: postgres:16
    container_name: chat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: chat_password
      POSTGRES_DB: chat_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: chat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
